<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Outil Décisionnel de Survie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">Prédiction Clinique de la Survie (Cox Model)</h1>

        <div class="row">
            <div class="col-md-5">
                <div class="card p-4 shadow-sm">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Âge du patient</label>
                            <input type="number" name="age" class="form-control" value="65" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sexe</label>
                            <select name="sexe" class="form-select">
                                <option value="1">Homme</option>
                                <option value="0">Femme</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Taux d'hémoglobine (g/dl)</label>
                            <input type="number" step="0.1" name="hemo" class="form-control" value="11.0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Évolution des symptômes (mois)</label>
                            <input type="number" name="sympt" class="form-control" value="6" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Diabète ?</label>
                            <select name="diabete" class="form-select">
                                <option value="0">NON</option>
                                <option value="1">OUI</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Métastases Hépatiques ?</label>
                            <select name="metastase" class="form-select">
                                <option value="0">NON</option>
                                <option value="1">OUI</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Dénutrition ?</label>
                            <select name="denutrition" class="form-select">
                                <option value="0">NON</option>
                                <option value="1">OUI</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Traitement par Chirurgie ?</label>
                            <select name="chirurgie" class="form-select">
                                <option value="1">OUI</option>
                                <option value="0">NON</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Simuler le profil</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                {% if score_risque %}
                    <div class="alert alert-info text-center shadow-sm">
                        <h4>Score de risque relatif : <strong>{{ score_risque }}</strong></h4>
                    </div>
                    <div class="card p-4 shadow-sm bg-white">
                        <canvas id="survivalChart"></canvas>
                    </div>
                {% else %}
                    <div class="h-100 d-flex align-items-center justify-content-center border rounded bg-white p-5 text-muted text-center shadow-sm">
                        <p>Veuillez configurer un patient à gauche puis cliquer sur "Simuler".</p>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>

    <script>
        {% if prediction_data %}
            const dataCtx = JSON.parse('{{ prediction_data | safe }}');
            const ctx = document.getElementById('survivalChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataCtx.labels,
                    datasets: [{
                        label: 'Probabilité de survie S(t)',
                        data: dataCtx.values,
                        borderColor: '#0d6efd',
                        borderWidth: 3,
                        fill: false,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { title: { display: true, text: 'Temps (mois)' } },
                        y: { min: 0, max: 1.05, title: { display: true, text: 'Probabilité' } }
                    }
                }
            });
        {% endif %}
    </script>
</body>
</html>
